<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parallel Universe AI</title>

<style>
/* --- YOUR ORIGINAL STYLES (UNCHANGED FOR SPACE) --- */
/* (keeping minimal comment so response is readable) */

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4f 25%, #2d0a4e 50%, #1a0033 75%, #0a0e27 100%);
    min-height:100vh;
    color:#e0e0ff;
    padding:20px;
}

.container { max-width:1200px; margin:auto; position:relative; z-index:1; }

header { text-align:center; margin-bottom:40px; }

h1 {
    font-size:3em;
    background: linear-gradient(135deg,#00d9ff,#b00eff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.input-section {
    background: rgba(26,31,79,0.6);
    padding:30px;
    border-radius:20px;
}

input, textarea {
    width:100%;
    margin-top:5px;
    padding:10px;
    border-radius:10px;
    border:1px solid #00d9ff;
    background:rgba(255,255,255,0.05);
    color:white;
}

button {
    padding:12px 30px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.btn-generate {
    background:#00d9ff;
    color:#000;
}

.loading { display:none; text-align:center; margin:20px 0; }
.loading.active { display:block; }

.spinner {
    width:40px;height:40px;
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid #00d9ff;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin { 100% { transform:rotate(360deg); } }

.results-section { display:none; margin-top:30px; }
.results-section.active { display:block; }

.universe-card {
    background: rgba(255,255,255,0.05);
    padding:20px;
    margin:15px 0;
    border-left:4px solid #00d9ff;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>✨ Parallel Universe AI ✨</h1>
    <p>AI generates your alternate life paths</p>
</header>

<div class="input-section">
    <form id="inputForm">

        <input id="name" placeholder="Your Name" required />
        <input id="interests" placeholder="Interests (tech, music...)" required />
        <input id="situation" placeholder="Current situation" required />
        <input id="decision" placeholder="Big decision" required />
        <textarea id="details" placeholder="More details..." required></textarea>

        <br/><br/>

        <button class="btn-generate" type="submit">
            Generate Universes
        </button>

    </form>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI is thinking...</p>
</div>

<div class="results-section" id="results">

    <h2>🌌 Your Parallel Universes</h2>

    <div id="output"></div>

    <br/>
    <button onclick="location.reload()">Try Again</button>

</div>

</div>

<script>

const form = document.getElementById("inputForm");
const loading = document.getElementById("loading");
const results = document.getElementById("results");
const output = document.getElementById("output");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        interests: document.getElementById("interests").value,
        situation: document.getElementById("situation").value,
        decision: document.getElementById("decision").value,
        details: document.getElementById("details").value
    };

    loading.classList.add("active");
    results.classList.remove("active");

    try {
        const universes = await generateAI(data);

        renderUniverses(universes);

        results.classList.add("active");

    } catch (err) {
        alert("AI error. Check backend.");
        console.error(err);
    }

    loading.classList.remove("active");
});


async function generateAI(data) {

    const res = await fetch("https://parallel-backend.onrender.com/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    const cleaned = result.result.replace(/```json|```/g, "").trim();

    return JSON.parse(cleaned).universes;
}


function renderUniverses(universes) {

    output.innerHTML = "";

    universes.forEach((u, i) => {

        const div = document.createElement("div");
        div.className = "universe-card";

        div.innerHTML = `
            <h3>Universe ${i+1}: ${u.title}</h3>
            <p><b>Path:</b> ${u.careerPath}</p>
            <p><b>Story:</b> ${u.description}</p>
            <p><b>Outcome:</b> ${u.outcome}</p>
        `;

        output.appendChild(div);
    });
}

</script>

</body>
</html>
