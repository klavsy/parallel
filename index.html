<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Universe AI</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0a0e27,#1a1f4f,#2d0a4e);
    color: #e0e0ff;
    margin: 0;
    padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

h1 {
    text-align:center;
    background: linear-gradient(90deg,#00d9ff,#b00eff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.input {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid rgba(0,217,255,0.3);
}

input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #00d9ff55;
    background: rgba(0,0,0,0.2);
    color: white;
}

button {
    background: linear-gradient(90deg,#00d9ff,#00a8cc);
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-top: 10px;
    border-left: 4px solid #00d9ff;
    border-radius: 10px;
    animation: fade 0.4s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

#status {
    margin: 10px 0;
    font-size: 14px;
    color: #00d9ff;
}

.error {
    color: #ff6b6b;
}
</style>
</head>

<body>

<div class="container">

<h1>✨ Parallel Universe AI</h1>

<div class="input">
    <input id="name" placeholder="Your name">
    <input id="interests" placeholder="Interests">
    <input id="situation" placeholder="Current situation">
    <input id="decision" placeholder="Big decision">
    <textarea id="details" placeholder="More details"></textarea>

    <button onclick="generate()">Generate Universes</button>

    <div id="status"></div>
</div>

<div id="results"></div>

</div>

<script>

const BACKEND_URL = "https://parallel-backend-wq04.onrender.com";

const statusBox = document.getElementById("status");
const results = document.getElementById("results");

// ================= MAIN FUNCTION =================
async function generate() {

    results.innerHTML = "";
    setStatus("Connecting to AI backend...");

    const data = {
        name: val("name"),
        interests: val("interests"),
        situation: val("situation"),
        decision: val("decision"),
        details: val("details")
    };

    try {
        const response = await fetchWithRetry(`${BACKEND_URL}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        setStatus("Processing AI response...");

        const json = await response.json();

        if (!json.result) {
            throw new Error("Invalid backend response format");
        }

        let clean = json.result.replace(/```json|```/g, "").trim();

        let parsed;
        try {
            parsed = JSON.parse(clean);
        } catch (e) {
            throw new Error("AI returned invalid JSON");
        }

        if (!parsed.universes || !Array.isArray(parsed.universes)) {
            throw new Error("Missing universes array in response");
        }

        setStatus("Done ✨");

        render(parsed.universes);

    } catch (err) {
        console.error(err);
        setStatus("❌ " + friendlyError(err), true);
    }
}

// ================= RETRY SYSTEM =================
async function fetchWithRetry(url, options, retries = 2) {
    try {
        const res = await fetch(url, options);

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        return res;

    } catch (err) {
        if (retries > 0) {
            setStatus("Retrying connection...");
            await new Promise(r => setTimeout(r, 1200));
            return fetchWithRetry(url, options, retries - 1);
        }
        throw err;
    }
}

// ================= RENDER =================
function render(universes) {
    results.innerHTML = "";

    universes.forEach((u, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>Universe ${i + 1}: ${u.title}</h3>
            <p><b>${u.subtitle}</b></p>
            <p>${u.description}</p>
            <hr>
            <p>${u.outcome}</p>
        `;

        results.appendChild(div);
    });
}

// ================= STATUS =================
function setStatus(msg, isError=false) {
    statusBox.textContent = msg;
    statusBox.className = isError ? "error" : "";
}

// ================= ERROR TRANSLATOR =================
function friendlyError(err) {

    const msg = err.message.toLowerCase();

    if (msg.includes("failed to fetch")) {
        return "Backend is not reachable (Render might be waking up)";
    }

    if (msg.includes("cors")) {
        return "CORS blocked request (backend config issue)";
    }

    if (msg.includes("500")) {
        return "AI server error (check backend logs)";
    }

    if (msg.includes("invalid json")) {
        return "AI returned broken response format";
    }

    return "Unexpected error: " + err.message;
}

// ================= HELPERS =================
function val(id) {
    return document.getElementById(id).value;
}

</script>

</body>
</html>
