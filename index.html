<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Universe</title>

    <!-- KEEP ALL YOUR EXISTING CSS EXACTLY AS IT WAS -->
    <style>
        /* YOUR EXISTING CSS HERE (UNCHANGED) */
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>✨ Parallel Universe ✨</h1>
            <p>Explore alternate realities based on your actual history</p>
        </header>

        <div class="error-message" id="errorMessage"></div>

        <div class="input-section">
            <h2>Tell Me About Yourself</h2>

            <form id="inputForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="name" required>
                    </div>

                    <div class="form-group">
                        <label>Interests</label>
                        <input type="text" id="interests" required>
                    </div>

                    <div class="form-group">
                        <label>Situation</label>
                        <input type="text" id="situation" required>
                    </div>

                    <div class="form-group">
                        <label>Decision</label>
                        <input type="text" id="decision" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Details</label>
                    <textarea id="details" required></textarea>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-generate">Generate Universes</button>
                    <button type="reset" class="btn-reset">Clear</button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">Scanning parallel universes...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <h2 class="results-title">Your 3 Parallel Universes</h2>
            <div class="universes-grid" id="universesContainer"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('inputForm');
        const loading = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');
        const universesContainer = document.getElementById('universesContainer');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            clearError();

            const name = document.getElementById('name').value.trim();
            const interests = document.getElementById('interests').value.trim();
            const situation = document.getElementById('situation').value.trim();
            const decision = document.getElementById('decision').value.trim();
            const details = document.getElementById('details').value.trim();

            if (!name || !interests || !situation || !decision || !details) {
                showError("Please fill all fields");
                return;
            }

            loading.classList.add("active");
            resultsSection.classList.remove("active");

            try {
                const res = await fetch("/api/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        interests,
                        situation,
                        decision,
                        details
                    })
                });

                const universes = await res.json();

                loading.classList.remove("active");
                displayUniverses(universes);
                resultsSection.classList.add("active");

                scrollToResults();

            } catch (err) {
                loading.classList.remove("active");
                showError("AI server not reachable. Check backend.");
            }
        });

        function displayUniverses(universes) {
            universesContainer.innerHTML = "";

            universes.forEach(u => {
                const card = document.createElement("div");
                card.className = "universe-card";

                card.innerHTML = `
                    <div class="universe-header">
                        <div class="universe-number">${u.number}</div>
                        <div class="universe-title">
                            <h3>${u.title}</h3>
                            <p>${u.subtitle}</p>
                        </div>
                    </div>

                    <div class="universe-content">
                        <div class="content-block">
                            <h4>Story</h4>
                            <p>${u.description}</p>
                        </div>

                        <div class="content-block">
                            <h4>Career Path</h4>
                            <p>${u.careerPath}</p>
                        </div>

                        <div class="content-block">
                            <h4>Key Events</h4>
                            <ul>
                                ${u.keyEvents.map(e => `<li>${e}</li>`).join("")}
                            </ul>
                        </div>

                        <div class="content-block">
                            <h4>Outcome</h4>
                            <p>${u.outcome}</p>
                        </div>
                    </div>
                `;

                universesContainer.appendChild(card);
            });
        }

        function scrollToResults() {
            resultsSection.scrollIntoView({ behavior: "smooth" });
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add("active");
        }

        function clearError() {
            errorMessage.classList.remove("active");
        }
    </script>
</body>
</html>
