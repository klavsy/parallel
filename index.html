<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parallel Universe</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4f 25%, #2d0a4e 50%, #1a0033 75%, #0a0e27 100%);
    min-height: 100vh;
    color: #e0e0ff;
    padding: 20px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(176, 14, 255, 0.1), transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(100, 50, 255, 0.08), transparent 50%);
    z-index: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    position: relative;
    z-index: 1;
}

header {
    text-align: center;
    margin-bottom: 40px;
}

h1 {
    font-size: 3rem;
    background: linear-gradient(135deg, #00d9ff, #b00eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-section {
    background: rgba(26,31,79,0.6);
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(10px);
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 12px;
}

input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #00d9ff55;
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

textarea {
    width: 100%;
    margin-top: 10px;
    min-height: 90px;
}

button {
    margin-top: 15px;
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #00d9ff;
}

button:hover {
    transform: scale(1.02);
}

.loading, .error {
    display: none;
    text-align: center;
    margin: 15px 0;
}

.loading.active, .error.active {
    display: block;
}

.results-section {
    display: none;
}

.results-section.active {
    display: block;
}

.universe-card {
    background: rgba(255,255,255,0.06);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
    border-left: 4px solid #00d9ff;
}

.universe-card h3 {
    color: #00d9ff;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>✨ Parallel Universe</h1>
    <p>AI-powered life path generator</p>
</header>

<div class="error" id="error"></div>

<div class="input-section">
    <form id="form">

        <div class="form-grid">
            <input id="name" placeholder="Your name" />
            <input id="interests" placeholder="Interests" />
            <input id="situation" placeholder="Current situation" />
            <input id="decision" placeholder="Big decision" />
        </div>

        <textarea id="details" placeholder="Tell more about your situation..."></textarea>

        <button type="submit">Generate Universes</button>
    </form>
</div>

<div class="loading" id="loading">
🌌 AI is scanning alternate timelines...
</div>

<div class="results-section" id="results">
    <h2>Your Parallel Futures</h2>
    <div id="cards"></div>
</div>

</div>

<script>

const API = "https://parallel-backend-wq04.onrender.com/generate";

const form = document.getElementById("form");
const loading = document.getElementById("loading");
const results = document.getElementById("results");
const cards = document.getElementById("cards");
const error = document.getElementById("error");

/* ================= SUBMIT ================= */

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    error.classList.remove("active");

    const payload = {
        name: name.value.trim(),
        interests: interests.value.trim(),
        situation: situation.value.trim(),
        decision: decision.value.trim(),
        details: details.value.trim()
    };

    if (!payload.name || !payload.interests || !payload.situation || !payload.decision || !payload.details) {
        showError("Please fill all fields");
        return;
    }

    loading.classList.add("active");
    results.classList.remove("active");

    try {

        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        console.log("Backend:", data);

        const universes = parse(data);

        if (!universes.length) throw new Error("No universes");

        render(universes);

        results.classList.add("active");

    } catch (err) {
        console.error(err);
        showError("AI failed to generate response. Check backend.");
    } finally {
        loading.classList.remove("active");
    }
});

/* ================= PARSER ================= */

function parse(data) {

    if (data.universes && Array.isArray(data.universes)) {
        return data.universes;
    }

    if (typeof data.result === "string") {
        try {
            let cleaned = data.result
                .replace(/```json/g, "")
                .replace(/```/g, "")
                .trim();

            const parsed = JSON.parse(cleaned);
            return parsed.universes || [];
        } catch (e) {
            console.log("Parse error");
        }
    }

    return [];
}

/* ================= RENDER ================= */

function render(universes) {
    cards.innerHTML = "";

    universes.forEach(u => {
        const div = document.createElement("div");

        div.className = "universe-card";

        div.innerHTML = `
            <h3>${u.title}</h3>
            <p><b>${u.subtitle}</b></p>
            <p>${u.description}</p>
            <p><b>Career:</b> ${u.careerPath}</p>
            <p><b>Outcome:</b> ${u.outcome}</p>
            <ul>
                ${(u.keyEvents || []).map(e => `<li>${e}</li>`).join("")}
            </ul>
        `;

        cards.appendChild(div);
    });
}

/* ================= ERROR ================= */

function showError(msg) {
    error.textContent = msg;
    error.classList.add("active");
}

</script>

</body>
</html>
