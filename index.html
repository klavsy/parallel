<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parallel Universe</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4f 25%, #2d0a4e 50%, #1a0033 75%, #0a0e27 100%);
    min-height: 100vh;
    color: #e0e0ff;
    padding: 20px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(176, 14, 255, 0.1), transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(100, 50, 255, 0.08), transparent 50%);
    z-index: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    position: relative;
    z-index: 1;
}

header {
    text-align: center;
    margin-bottom: 40px;
}

h1 {
    font-size: 3rem;
    background: linear-gradient(135deg, #00d9ff, #b00eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-section {
    background: rgba(26,31,79,0.6);
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(10px);
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 12px;
}

input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #00d9ff55;
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

textarea {
    width: 100%;
    margin-top: 10px;
    min-height: 90px;
}

button {
    margin-top: 15px;
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #00d9ff;
}

button:hover {
    transform: scale(1.03);
}

.loading, .error {
    display: none;
    text-align: center;
    margin: 15px 0;
}

.loading.active, .error.active {
    display: block;
}

.results-section {
    display: none;
}

.results-section.active {
    display: block;
}

.universe-card {
    background: rgba(255,255,255,0.06);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
    border-left: 4px solid #00d9ff;
}

.universe-card h3 {
    color: #00d9ff;
}

</style>
</head>

<body>

<div class="container">

<header>
    <h1>✨ Parallel Universe</h1>
    <p>AI-powered alternate life generator</p>
</header>

<div class="error" id="errorBox"></div>

<div class="input-section">
    <form id="form">

        <div class="form-grid">
            <input id="name" placeholder="Your name" required />
            <input id="interests" placeholder="Interests" required />
            <input id="situation" placeholder="Current situation" required />
            <input id="decision" placeholder="Big decision" required />
        </div>

        <textarea id="details" placeholder="Tell more..." required></textarea>

        <button type="submit">Generate Universes</button>
    </form>
</div>

<div class="loading" id="loading">
🌌 Generating your parallel universes...
</div>

<div class="results-section" id="results">
    <h2>Your Universes</h2>
    <div id="cards"></div>
</div>

</div>

<script>

const API_URL = "https://parallel-backend-wq04.onrender.com/generate";

const form = document.getElementById("form");
const loading = document.getElementById("loading");
const results = document.getElementById("results");
const cards = document.getElementById("cards");
const errorBox = document.getElementById("errorBox");

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add("active");
}

function hideError() {
    errorBox.classList.remove("active");
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const payload = {
        name: document.getElementById("name").value.trim(),
        interests: document.getElementById("interests").value.trim(),
        situation: document.getElementById("situation").value.trim(),
        decision: document.getElementById("decision").value.trim(),
        details: document.getElementById("details").value.trim()
    };

    if (!payload.name || !payload.interests || !payload.situation || !payload.decision || !payload.details) {
        showError("Please fill in all fields");
        return;
    }

    loading.classList.add("active");
    results.classList.remove("active");
    cards.innerHTML = "";

    try {

        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        console.log("Backend response:", data);

        let universes = [];

        if (data.universes && Array.isArray(data.universes)) {
            universes = data.universes;
        }

        else if (typeof data.result === "string") {
            try {
                const cleaned = data.result
                    .replace(/```json/g, "")
                    .replace(/```/g, "")
                    .trim();

                const parsed = JSON.parse(cleaned);
                universes = parsed.universes || [];
            } catch (err) {
                console.error("Parse error:", err);
            }
        }

        if (!universes.length) {
            throw new Error("No universes returned");
        }

        universes.forEach(u => {
            const div = document.createElement("div");
            div.className = "universe-card";

            div.innerHTML = `
                <h3>${u.title}</h3>
                <p><b>${u.subtitle}</b></p>
                <p>${u.description}</p>
                <p><b>Career:</b> ${u.careerPath}</p>
                <p><b>Outcome:</b> ${u.outcome}</p>
                <ul>
                    ${(u.keyEvents || []).map(e => `<li>${e}</li>`).join("")}
                </ul>
            `;

            cards.appendChild(div);
        });

        results.classList.add("active");

    } catch (err) {
        console.error(err);
        showError("❌ AI failed to respond. Check backend / Render logs.");
    } finally {
        loading.classList.remove("active");
    }
});

</script>

</body>
</html>
