<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Universe</title>

<style>
/* ================= YOUR ORIGINAL DESIGN (UNCHANGED STYLE CORE) ================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4f 25%, #2d0a4e 50%, #1a0033 75%, #0a0e27 100%);
    min-height: 100vh;
    color: #e0e0ff;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

header {
    text-align: center;
    margin-bottom: 40px;
}

h1 {
    font-size: 3em;
    background: linear-gradient(135deg, #00d9ff, #b00eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-section {
    background: rgba(26,31,79,0.6);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(0,217,255,0.3);
    margin-bottom: 30px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,217,255,0.3);
    background: rgba(255,255,255,0.05);
    color: white;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.btn {
    background: linear-gradient(135deg,#00d9ff,#00a8cc);
    color: black;
}

.results {
    margin-top: 30px;
}

.card {
    background: rgba(26,31,79,0.7);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    border-left: 4px solid #00d9ff;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

.loading {
    display: none;
    text-align: center;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>✨ Parallel Universe</h1>
    <p>AI generates your alternate life paths</p>
</header>

<div class="input-section">

    <form id="form">

        <div class="form-grid">
            <input id="name" placeholder="Your name" required>
            <input id="interests" placeholder="Your interests" required>
            <input id="situation" placeholder="Current situation" required>
            <input id="decision" placeholder="Big decision" required>
        </div>

        <br>

        <textarea id="details" placeholder="Tell more..." required></textarea>

        <br><br>

        <button class="btn" type="submit">Generate Universes</button>

    </form>
</div>

<div class="loading" id="loading">Generating your universes...</div>

<div class="results" id="results"></div>

</div>

<script>

const BACKEND_URL = "https://parallel-backend-wq04.onrender.com";

const form = document.getElementById("form");
const loading = document.getElementById("loading");
const results = document.getElementById("results");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    loading.style.display = "block";
    results.innerHTML = "";

    const data = {
        name: document.getElementById("name").value,
        interests: document.getElementById("interests").value,
        situation: document.getElementById("situation").value,
        decision: document.getElementById("decision").value,
        details: document.getElementById("details").value
    };

    try {
        const res = await fetch(`${BACKEND_URL}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const json = await res.json();

        let text = json.result;

        // remove markdown if backend returns it
        text = text.replace(/```json|```/g, "");

        const parsed = JSON.parse(text);

        loading.style.display = "none";

        parsed.universes.forEach(u => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h3>${u.title}</h3>
                <p><b>${u.subtitle}</b></p>
                <p>${u.description}</p>
                <hr>
                <p><b>Outcome:</b> ${u.outcome}</p>
            `;

            results.appendChild(div);
        });

    } catch (err) {
        loading.style.display = "none";
        results.innerHTML = "<p style='color:red'>Error connecting to AI backend.</p>";
        console.error(err);
    }
});

</script>

</body>
</html>
