<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parallel Universe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0a0e27,#1a1f4f,#2d0a4e);
    color: white;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    background: linear-gradient(90deg,#00d9ff,#b00eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 40px;
}

.input-section {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #00d9ff55;
    background: rgba(0,0,0,0.3);
    color: white;
}

button {
    background: #00d9ff;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    margin-top: 10px;
}

button:hover { opacity: 0.8; }

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-top: 15px;
    border-left: 4px solid #00d9ff;
    border-radius: 10px;
}

.loading {
    display: none;
    text-align: center;
    margin: 15px;
}

.error {
    display: none;
    background: rgba(255,0,0,0.2);
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>✨ Parallel Universe</h1>

    <div class="input-section">
        <input id="name" placeholder="Your name">
        <input id="interests" placeholder="Interests">
        <input id="situation" placeholder="Current situation">
        <input id="decision" placeholder="Big decision">
        <textarea id="details" placeholder="More details"></textarea>

        <button onclick="generate()">Generate Universes</button>

        <div class="loading" id="loading">🌌 Generating universes...</div>
        <div class="error" id="error"></div>
    </div>

    <div id="results"></div>
</div>

<script>
const BACKEND_URL = "https://parallel-backend-wq04.onrender.com/generate";

function showError(msg) {
    const e = document.getElementById("error");
    e.style.display = "block";
    e.innerText = msg;
}

function hideError() {
    const e = document.getElementById("error");
    e.style.display = "none";
}

function setLoading(v) {
    document.getElementById("loading").style.display = v ? "block" : "none";
}

async function generate() {
    hideError();

    // FIXED: proper DOM access
    const payload = {
        name: document.getElementById("name").value,
        interests: document.getElementById("interests").value,
        situation: document.getElementById("situation").value,
        decision: document.getElementById("decision").value,
        details: document.getElementById("details").value
    };

    if (Object.values(payload).some(v => !v)) {
        showError("Fill all fields first.");
        return;
    }

    setLoading(true);
    document.getElementById("results").innerHTML = "";

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!data.result) {
            throw new Error("No result from backend");
        }

        // Gemini returns STRING → must parse JSON inside it
        let parsed;

        try {
            parsed = JSON.parse(data.result);
        } catch (e) {
            // fallback extraction
            const start = data.result.indexOf("[");
            const end = data.result.lastIndexOf("]") + 1;
            parsed = JSON.parse(data.result.slice(start, end));
        }

        render(parsed.universes || parsed);

    } catch (err) {
        console.error(err);
        showError("Backend error. Check Render logs.");
    }

    setLoading(false);
}

function render(universes) {
    const root = document.getElementById("results");
    root.innerHTML = "";

    universes.forEach((u, i) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h2>Universe ${i + 1}: ${u.title}</h2>
            <h4>${u.subtitle || ""}</h4>
            <p>${u.description || ""}</p>
            <hr/>
            <p><b>Career:</b> ${u.careerPath}</p>
            <p><b>Outcome:</b> ${u.outcome}</p>
            <ul>
                ${(u.keyEvents || []).map(e => `<li>${e}</li>`).join("")}
            </ul>
        `;

        root.appendChild(div);
    });
}
</script>

</body>
</html>
