<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4f 25%, #2d0a4e 50%, #1a0033 75%, #0a0e27 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e0e0ff;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(176, 14, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(100, 50, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: shimmer 8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d9ff, #b00eff, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        p {
            font-size: 1.1em;
            color: #b0a8ff;
            margin-bottom: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(176, 14, 255, 0.2);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 217, 255, 0.5), 0 0 60px rgba(176, 14, 255, 0.4);
            }
        }

        /* Language selector (matches theme) */
        .lang-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .lang-bar label {
            color: #b0a8ff;
            font-size: 0.95em;
        }

        .lang-select {
            padding: 10px 15px;
            background: rgba(26, 31, 79, 0.7);
            border: 1.5px solid rgba(0, 217, 255, 0.4);
            border-radius: 10px;
            color: #e0e0ff;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-select:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .lang-select option {
            background: #1a1f4f;
            color: #e0e0ff;
        }

        .input-section {
            background: rgba(26, 31, 79, 0.6);
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            animation: slideUp 0.8s ease-out;
        }

        .input-section h2 {
            color: #00d9ff;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #00d9ff;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95em;
        }

        input, textarea {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(0, 217, 255, 0.4);
            border-radius: 10px;
            color: #e0e0ff;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #00d9ff, #00a8cc);
            color: #0a0e27;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.6);
        }

        .btn-generate:active {
            transform: translateY(-1px);
        }

        .btn-reset {
            background: rgba(176, 14, 255, 0.2);
            color: #b00eff;
            border: 2px solid #b00eff;
        }

        .btn-reset:hover {
            background: rgba(176, 14, 255, 0.3);
            box-shadow: 0 4px 20px rgba(176, 14, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results-section {
            display: none;
            animation: fadeIn 1s ease-out;
        }

        .results-section.active {
            display: block;
        }

        .results-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #b00eff, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .universes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .universe-card {
            background: rgba(26, 31, 79, 0.7);
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            transition: all 0.4s ease;
            animation: cardPop 0.6s ease-out both;
        }

        .universe-card:nth-child(1) {
            animation-delay: 0.1s;
            border-left: 5px solid #00d9ff;
        }

        .universe-card:nth-child(2) {
            animation-delay: 0.2s;
            border-left: 5px solid #b00eff;
        }

        .universe-card:nth-child(3) {
            animation-delay: 0.3s;
            border-left: 5px solid #ff00d9;
        }

        .universe-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 217, 255, 0.6);
            box-shadow: 0 15px 50px rgba(0, 217, 255, 0.2);
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .universe-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .universe-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d9ff, #b00eff);
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.5em;
            color: #0a0e27;
        }

        .universe-title {
            flex: 1;
        }

        .universe-title h3 {
            font-size: 1.5em;
            color: #00d9ff;
            margin-bottom: 5px;
        }

        .universe-title p {
            color: #b0a8ff;
            font-size: 0.9em;
        }

        .universe-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .content-block {
            border-left: 3px solid rgba(0, 217, 255, 0.4);
            padding-left: 15px;
        }

        .content-block h4 {
            color: #00d9ff;
            font-size: 0.95em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content-block p {
            color: #d0d0ff;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .content-block ul {
            list-style: none;
            color: #d0d0ff;
            line-height: 1.8;
        }

        .content-block li::before {
            content: "→ ";
            color: #00d9ff;
            font-weight: bold;
            margin-right: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 217, 255, 0.2);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00d9ff;
            font-size: 1.1em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-message {
            background: rgba(255, 100, 100, 0.1);
            border: 2px solid #ff6464;
            color: #ff9999;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message.active {
            display: block;
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #6a6a8f;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
            }

            .input-section {
                padding: 25px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .results-title {
                font-size: 1.8em;
            }

            .universes-grid {
                grid-template-columns: 1fr;
            }
        }

        let currentLang = "en";

        // ====== DOM REFS ======
        const form = document.getElementById('inputForm');
        const loading = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');
        const universesContainer = document.getElementById('universesContainer');
        const errorMessage = document.getElementById('errorMessage');
        const langSelect = document.getElementById('langSelect');

        // ====== LANGUAGE HANDLING ======
        function applyLanguage(lang) {
            currentLang = I18N[lang] ? lang : "en";
            const dict = I18N[currentLang];

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key] !== undefined) el.textContent = dict[key];
            });

            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
            });

            document.documentElement.lang = currentLang;
        }

        langSelect.addEventListener('change', (e) => {
            applyLanguage(e.target.value);
        });

        // ====== FORM SUBMIT ======
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const payload = {
                name: document.getElementById('name').value.trim(),
                interests: document.getElementById('interests').value.trim(),
                situation: document.getElementById('situation').value.trim(),
                decision: document.getElementById('decision').value.trim(),
                details: document.getElementById('details').value.trim(),
                lang: currentLang
            };

            // Validation (lang is always set, so check the 5 user fields)
            const userFields = [payload.name, payload.interests, payload.situation, payload.decision, payload.details];
            if (userFields.some(v => !v)) {
                showError(I18N[currentLang].errFill);
                return;
            }

            loading.classList.add('active');
            resultsSection.classList.remove('active');

            try {
                const res = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    let detail = "";
                    try {
                        const errJson = await res.json();
                        detail = errJson.error || errJson.details || "";
                    } catch (_) {}
                    throw new Error(`Server error ${res.status}${detail ? ": " + detail : ""}`);
                }

                const data = await res.json();

                if (!data.universes || !Array.isArray(data.universes) || data.universes.length === 0) {
                    throw new Error("No universes returned from the server");
                }

                displayUniverses(data.universes);
                resultsSection.classList.add('active');
                scrollToResults();

            } catch (err) {
                console.error(err);
                showError(err.message || "Something went wrong. Please try again.");
            } finally {
                loading.classList.remove('active');
            }
        });

        function displayUniverses(universes) {
            universesContainer.innerHTML = '';
            const dict = I18N[currentLang];

            universes.forEach((universe, index) => {
                const card = document.createElement('div');
                card.className = 'universe-card';

                const number = index + 1;
                const keyEvents = Array.isArray(universe.keyEvents) ? universe.keyEvents : [];

                card.innerHTML = `
                    <div class="universe-header">
                        <div class="universe-number">${number}</div>
                        <div class="universe-title">
                            <h3>${universe.title || 'Universe ' + number}</h3>
                            <p>${universe.subtitle || ''}</p>
                        </div>
                    </div>

                    <div class="universe-content">
                        <div class="content-block">
                            <h4>📖 ${dict.story}</h4>
                            <p>${universe.description || ''}</p>
                        </div>

                        <div class="content-block">
                            <h4>🚀 ${dict.career}</h4>
                            <p>${universe.careerPath || ''}</p>
                        </div>

                        <div class="content-block">
                            <h4>⏱️ ${dict.events}</h4>
                            <ul>
                                ${keyEvents.map(event => `<li>${event}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="content-block">
                            <h4>✨ ${dict.outcome}</h4>
                            <p>${universe.outcome || ''}</p>
                        </div>
                    </div>
                `;

                universesContainer.appendChild(card);
            });
        }

        function scrollToResults() {
            setTimeout(() => {
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        function scrollToForm() {
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            form.reset();
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 6000);
        }

        function clearError() {
            errorMessage.classList.remove('active');
        }

        // ====== INIT ======
        applyLanguage('en');
    </script>
</body>
</html>
